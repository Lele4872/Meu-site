<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> 💘</title>
<style>
  :root {
    --rosa1: #7c003a;
    --rosa2: #ff4fa4;
  }

  body {
    background: linear-gradient(135deg, var(--rosa1), var(--rosa2));
    font-family: "Poppins", sans-serif;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
  }

  h1 {
    font-size: 2.3em;
    margin-bottom: 10px;
  }

  p.sub {
    font-size: 1.1em;
    margin-bottom: 25px;
    opacity: 0.9;
  }

  .pergunta {
    background: rgba(255, 255, 255, 0.15);
    padding: 20px;
    border-radius: 10px;
    margin: 10px 0;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
  }

  .pergunta p {
    margin-bottom: 10px;
    font-weight: 500;
  }

  input {
    width: 90%;
    padding: 8px;
    border-radius: 8px;
    border: none;
    text-align: center;
    outline: none;
    font-size: 1em;
  }

  button {
    background-color: #fff;
    color: var(--rosa2);
    border: none;
    padding: 10px 25px;
    margin-top: 25px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
    font-size: 1em;
  }

  button:hover {
    background-color: var(--rosa2);
    color: #fff;
    transform: scale(1.05);
  }

  .mensagem {
    margin-top: 25px;
    font-size: 1.1em;
    transition: 0.3s ease;
  }

  .coração {
    position: absolute;
    color: #fff;
    animation: subir 4s linear infinite;
    font-size: 20px;
    opacity: 0.8;
  }

  @keyframes subir {
    from { transform: translateY(0); opacity: 0.9; }
    to { transform: translateY(-800px); opacity: 0; }
  }
</style>
</head>
<body>

<h1>💖 É boa com data? Boa Sorte! 💖</h1>
<p class="sub">Acho bom acertar tudo viu?! 😘</p>

<div class="pergunta">
  <p>1️⃣ Qual é a nossa data de namoro?</p>
  <input type="text" id="p1" placeholder="Digite aqui...">
</div>

<div class="pergunta">
  <p>2️⃣ Qual o dia e o mês do nosso primeiro beijo?</p>
  <input type="text" id="p2" placeholder="Digite aqui...">
</div>

<div class="pergunta">
  <p>3️⃣ Qual é a data da foto do sorriso mais lindo?</p>
  <input type="text" id="p3" placeholder="Digite aqui...">
</div>

<button onclick="verificar()">Enviar 💌</button>
<p class="mensagem" id="mensagem"></p>

<script>
function criarCorações() {
  const coração = document.createElement("div");
  coração.classList.add("coração");
  coração.textContent = "💖";
  coração.style.left = Math.random() * 100 + "vw";
  coração.style.animationDuration = Math.random() * 2 + 3 + "s";
  document.body.appendChild(coração);
  setTimeout(() => coração.remove(), 4000);
}

setInterval(criarCorações, 400);

function verificar() {
  const p1 = document.getElementById("p1").value.trim().toLowerCase();
  const p2 = document.getElementById("p2").value.trim().toLowerCase();
  const p3 = document.getElementById("p3").value.trim().toLowerCase();
  const msg = document.getElementById("mensagem");

  const certa1 = "18/10";
  const certa2 = "12/08";
  const certa3 = "15/06";

  if (p1 === certa1 && p2 === certa2 && p3 === certa3) {
    msg.innerHTML = "💞 Você me conhece demais! Carregando a surpresa...";
    msg.style.color = "#fff";
    setTimeout(() => {
      window.location.href = "voce.html";
    }, 2500);
  } else {
    msg.innerHTML = "😜 Haha! Tenta de novo, amor!";
    msg.style.color = "#ffe0e0";
  }
}
</script>

</body>
</html>
